<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Viewer — Namatovu Sharifah</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="assets/images/owner.png">
  <style>
    :root {
      --cream: #F2EDE4;
      --cream-dark: #E8E0D0;
      --rust: #8B3A1E;
      --rust-light: #C05A35;
      --moss: #4A5240;
      --moss-light: #6B7560;
      --charcoal: #1C1A17;
      --charcoal-mid: #2E2B26;
      --gold: #C9A96E;
      --gold-light: #E2C898;
      --off-white: #FAF7F2;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Montserrat', sans-serif;
      background: var(--charcoal);
      color: var(--cream);
      cursor: auto;
    }

    #viewer-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--charcoal);
      border-bottom: 1px solid rgba(201,169,110,0.2);
      padding: 1.5rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      backdrop-filter: blur(12px);
    }

    .viewer-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem;
      font-weight: 400;
      letter-spacing: 0.1em;
    }

    .viewer-controls {
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    .viewer-btn {
      background: none;
      border: 1px solid rgba(242,237,228,0.3);
      color: var(--cream);
      font-family: 'Montserrat', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      padding: 0.75rem 1.5rem;
      cursor: pointer;
      transition: all 0.3s;
      text-transform: uppercase;
      text-decoration: none;
      display: inline-block;
      border-radius: 2px;
    }

    .viewer-btn:hover {
      border-color: var(--gold);
      color: var(--gold);
      background: rgba(201,169,110,0.08);
    }

    .viewer-btn--download {
      border-color: var(--gold);
      color: var(--gold);
      background: rgba(201,169,110,0.08);
    }

    .viewer-btn--download:hover {
      background: rgba(201,169,110,0.15);
    }

    .viewer-btn--back {
      color: var(--rust-light);
      border-color: var(--rust-light);
    }

    .viewer-btn--back:hover {
      background: rgba(139,58,30,0.1);
    }

    #pdf-container {
      width: 100%;
      height: calc(100vh - 80px);
      padding: 2rem;
      background: var(--charcoal);
    }

    #pdf-embed {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 4px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }

    .error-message {
      color: var(--rust-light);
      font-size: 1rem;
      padding: 2rem;
      text-align: center;
      background: rgba(139,58,30,0.1);
      border: 1px solid rgba(139,58,30,0.3);
      border-radius: 4px;
      margin-top: 2rem;
    }

    /* Mobile fallback — iframes block PDFs on most mobile browsers */
    .mobile-fallback {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      height: 100%;
      text-align: center;
      padding: 2rem;
    }

    .mobile-fallback p {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem;
      font-weight: 300;
      color: rgba(242,237,228,0.6);
      line-height: 1.6;
    }

    .mobile-fallback a {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      text-decoration: none;
      padding: 1rem 2rem;
      border: 1px solid rgba(201,169,110,0.4);
      transition: all 0.3s;
    }

    .mobile-fallback a:hover {
      background: rgba(201,169,110,0.1);
      border-color: var(--gold);
    }

    @media (max-width: 599px) {
      #viewer-header {
        padding: 1rem 1.25rem;
        flex-direction: column;
        gap: 1rem;
        text-align: center;
      }

      .viewer-title {
        font-size: 1.1rem;
      }

      .viewer-controls {
        width: 100%;
        gap: 0.75rem;
      }

      .viewer-btn {
        font-size: 0.6rem;
        padding: 0.65rem 1rem;
        flex: 1;
      }

      #pdf-container {
        padding: 1rem;
        height: calc(100vh - 140px);
      }

      /* Hide iframe on mobile, show fallback instead */
      #pdf-embed { display: none; }
      .mobile-fallback { display: flex; }
    }
  </style>
</head>
<body>

<div id="viewer-header">
  <h1 class="viewer-title" id="pdf-title">PDF Viewer</h1>
  <div class="viewer-controls">
    <a href="index.html" class="viewer-btn viewer-btn--back">← Back</a>
    <a href="#" id="download-btn" class="viewer-btn viewer-btn--download" download>Download</a>
  </div>
</div>

<div id="pdf-container">
  <iframe id="pdf-embed" src="" title="PDF Viewer"></iframe>
  <div class="mobile-fallback" id="mobile-fallback">
    <p>PDF preview isn't supported on mobile browsers.</p>
    <a href="#" id="mobile-download">Download to view →</a>
  </div>
  <div id="error-msg" class="error-message" style="display: none;"></div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const pdfPath = params.get('pdf');
  const pdfTitle = params.get('title') || 'PDF';

  const embed = document.getElementById('pdf-embed');
  const titleEl = document.getElementById('pdf-title');
  const downloadBtn = document.getElementById('download-btn');
  const mobileDownload = document.getElementById('mobile-download');
  const errorMsg = document.getElementById('error-msg');

  if (pdfPath) {
    embed.src = pdfPath + '#toolbar=1&view=FitH';
    downloadBtn.href = pdfPath;
    downloadBtn.download = pdfPath.split('/').pop();
    mobileDownload.href = pdfPath;
    mobileDownload.download = pdfPath.split('/').pop();
    titleEl.textContent = pdfTitle;
  } else {
    errorMsg.textContent = 'No PDF specified. Please use the portfolio to select a PDF.';
    errorMsg.style.display = 'block';
    embed.style.display = 'none';
    document.getElementById('mobile-fallback').style.display = 'none';
  }
</script>

</body>
</html>
